name: Unit Tests

on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: unit-tests-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    busted:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
            pull-requests: write
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Lua 5.1 and LuaRocks
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks

            - name: Install test dependencies
              run: |
                  luarocks --lua-version=5.1 install --local moonscript
                  luarocks --lua-version=5.1 install --local busted

            - name: Run Busted tests (JUnit output)
              run: |
                  eval "$(luarocks --lua-version=5.1 path --local)"
                  mkdir -p test-results
                  busted Tests --output=junit > test-results/busted-junit.xml

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2.23.0
              with:
                  action_fail: true
                  action_fail_on_inconclusive: true
                  files: test-results/busted-junit.xml
